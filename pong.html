<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pong - Game Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }
    h1 { color: #e94560; margin-bottom: 10px; font-size: 2rem; text-shadow: 0 0 10px rgba(233, 69, 96, 0.5); }
    .game-info { display: flex; gap: 30px; margin-bottom: 10px; font-size: 1.1rem; color: #fff; }
    .game-info span { color: #e94560; font-weight: bold; }
    #gameCanvas {
      border: 3px solid #e94560;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
      cursor: none;
    }
    .instructions { margin-top: 15px; color: #aaa; text-align: center; font-size: 0.9rem; }
    .instructions kbd { background: #333; padding: 3px 8px; border-radius: 4px; border: 1px solid #555; font-family: monospace; color: #e94560; }
    #startBtn { margin-top: 15px; padding: 12px 35px; font-size: 1rem; background: #e94560; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
    #startBtn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(233, 69, 96, 0.5); }
    .game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 35px 50px; border-radius: 15px; border: 2px solid #e94560; text-align: center; display: none; }
    .game-over h2 { color: #e94560; font-size: 1.8rem; margin-bottom: 15px; }
    .game-over p { color: #fff; font-size: 1.1rem; margin-bottom: 15px; }
    .game-over button { padding: 10px 25px; font-size: 0.95rem; background: #e94560; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; margin: 5px; }
    #backBtn { margin-top: 15px; padding: 10px 25px; font-size: 0.95rem; background: #666; color: white; border: none; border-radius: 20px; cursor: pointer; }
    .leaderboard-table { width: 100%; color: #fff; border-collapse: collapse; margin-top: 10px; }
    .leaderboard-table th { color: #e94560; padding: 8px; border-bottom: 1px solid #444; text-align: left; }
    .leaderboard-table td { padding: 8px; border-bottom: 1px solid #333; }
    .leaderboard-table tr:first-child td:first-child { color: #FFD700; }
    .leaderboard-table tr:nth-child(2) td:first-child { color: #C0C0C0; }
    .leaderboard-table tr:nth-child(3) td:first-child { color: #CD7F32; }
    #nameInputContainer { margin-bottom: 20px; }
    #nameInputContainer input { padding: 10px; font-size: 1rem; border-radius: 10px; border: none; width: 200px; text-align: center; }
    #leaderboardContainer { display: none; margin-bottom: 20px; }
  </style>
</head>
<body>
  <h1>Pong</h1>
  <div class="game-info">
    <div>Player 1: <span id="p1Score">0</span></div>
    <div>Player 2: <span id="p2Score">0</span></div>
  </div>
  <canvas id="gameCanvas" width="700" height="450"></canvas>
  <div class="instructions">
    <p><kbd>W</kbd>/<kbd>S</kbd> - Player 1 | <kbd>Up</kbd>/<kbd>Down</kbd> - Player 2 | First to 5 wins!</p>
  </div>
  <select id="gameMode" style="padding: 10px; font-size: 1rem; border-radius: 10px; border: none; margin-top: 10px;">
    <option value="ai">1 Player (vs Computer)</option>
    <option value="2p">2 Players</option>
  </select>
  <button id="startBtn">Start Game</button>
  <button id="backBtn">Back to Hub</button>
  <div class="game-over" id="gameOver">
    <h2 id="winnerText">Player 1 Wins!</h2>
    <div id="nameInputContainer" style="margin-bottom: 20px;">
      <input type="text" id="playerName" placeholder="Enter your name" maxlength="15" style="padding: 10px; font-size: 1rem; border-radius: 10px; border: none; width: 200px; text-align: center;">
    </div>
    <div id="leaderboardContainer" style="display: none; margin-bottom: 20px;"></div>
    <button id="submitScoreBtn" style="margin-bottom: 10px;">Submit Score</button>
    <button id="restartBtn">Play Again</button>
  </div>
  <script src="leaderboard.js"></script>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const p1ScoreEl = document.getElementById('p1Score');
    const p2ScoreEl = document.getElementById('p2Score');
    const gameOverDiv = document.getElementById('gameOver');
    const winnerText = document.getElementById('winnerText');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const backBtn = document.getElementById('backBtn');
    const gameModeSelect = document.getElementById('gameMode');
    const playerNameInput = document.getElementById('playerName');
    const submitScoreBtn = document.getElementById('submitScoreBtn');
    const nameInputContainer = document.getElementById('nameInputContainer');
    const leaderboardContainer = document.getElementById('leaderboardContainer');
    const GAME_NAME = 'pong';

    const WIN_SCORE = 5;
    let gameRunning = false;
    let animationId;
    let isAI = true;

    const paddleWidth = 10, paddleHeight = 80;
    const ballSize = 10;

    let player1 = { x: 20, y: canvas.height/2 - paddleHeight/2, score: 0, dy: 0 };
    let player2 = { x: canvas.width - 30, y: canvas.height/2 - paddleHeight/2, score: 0, dy: 0 };
    let ball = { x: canvas.width/2, y: canvas.height/2, dx: 4, dy: 4, speed: 5 };

    function resetBall() {
      ball.x = canvas.width/2;
      ball.y = canvas.height/2;
      ball.dx = (Math.random() > 0.5 ? 1 : -1) * 4;
      ball.dy = (Math.random() * 6 - 3);
      ball.speed = 5;
    }

    function drawRect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function drawCircle(x, y, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fill();
    }

    function drawNet() {
      ctx.strokeStyle = '#444';
      ctx.setLineDash([10, 15]);
      ctx.beginPath();
      ctx.moveTo(canvas.width/2, 0);
      ctx.lineTo(canvas.width/2, canvas.height);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function draw() {
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawNet();
      drawRect(player1.x, player1.y, paddleWidth, paddleHeight, '#00ff88');
      drawRect(player2.x, player2.y, paddleWidth, paddleHeight, '#ff4444');
      drawCircle(ball.x, ball.y, ballSize, '#fff');
    }

    function update() {
      player1.y += player1.dy;
      player1.y = Math.max(0, Math.min(canvas.height - paddleHeight, player1.y));

      // AI for player 2 (easier)
      if (isAI) {
        const targetY = ball.y - paddleHeight/2;
        // AI is slower and has a delay
        const aiSpeed = 3.5;
        const reactionDelay = 0.08; // AI doesn't react perfectly
        const errorMargin = (Math.random() - 0.5) * 30; // Add some error
        const adjustedTarget = targetY + errorMargin;
        if (adjustedTarget > player2.y + 10) player2.y += Math.min(aiSpeed, 4);
        else if (adjustedTarget < player2.y - 10) player2.y -= Math.min(aiSpeed, 4);
        player2.y = Math.max(0, Math.min(canvas.height - paddleHeight, player2.y));
      } else {
        player2.y += player2.dy;
        player2.y = Math.max(0, Math.min(canvas.height - paddleHeight, player2.y));
      }

      ball.x += ball.dx;
      ball.y += ball.dy;

      if (ball.y <= 0 || ball.y >= canvas.height) ball.dy *= -1;

      if (ball.x <= player1.x + paddleWidth && ball.y >= player1.y && ball.y <= player1.y + paddleHeight && ball.dx < 0) {
        ball.dx *= -1;
        ball.speed = Math.min(ball.speed + 0.2, 12);
        ball.dx *= ball.speed/4;
      }

      if (ball.x >= player2.x - ballSize && ball.y >= player2.y && ball.y <= player2.y + paddleHeight && ball.dx > 0) {
        ball.dx *= -1;
        ball.speed = Math.min(ball.speed + 0.2, 12);
        ball.dx *= ball.speed/4;
      }

      if (ball.x < 0) { player2.score++; p2ScoreEl.textContent = player2.score; resetBall(); }
      if (ball.x > canvas.width) { player1.score++; p1ScoreEl.textContent = player1.score; resetBall(); }

      if (player1.score >= WIN_SCORE || player2.score >= WIN_SCORE) endGame();
    }

    function gameLoop() {
      if (!gameRunning) return;
      update();
      draw();
      animationId = requestAnimationFrame(gameLoop);
    }

    function endGame() {
      gameRunning = false;
      cancelAnimationFrame(animationId);
      winnerText.textContent = player1.score >= WIN_SCORE ? (isAI ? 'You Win!' : 'Player 1 Wins!') : (isAI ? 'Computer Wins!' : 'Player 2 Wins!');
      gameOverDiv.style.display = 'block';
      startBtn.style.display = 'none';

      playerNameInput.value = '';
      nameInputContainer.style.display = 'block';
      submitScoreBtn.disabled = true;
      submitScoreBtn.style.opacity = '0.5';
      // Show leaderboard if there are existing scores
      const existingLeaderboard = Leaderboard.get(GAME_NAME);
      if (existingLeaderboard && existingLeaderboard.length > 0) {
        leaderboardContainer.style.display = 'block';
        leaderboardContainer.innerHTML = '<h3 style="color: #e94560; margin-bottom: 10px;">Top 10 Players</h3>' + Leaderboard.render(GAME_NAME);
        submitScoreBtn.textContent = 'View Leaderboard';
        submitScoreBtn.onclick = showLeaderboard;
      } else {
        leaderboardContainer.style.display = 'none';
        submitScoreBtn.textContent = 'Submit Score';
        submitScoreBtn.onclick = submitScore;
      }
    }

    function showLeaderboard() {
      leaderboardContainer.style.display = 'block';
      submitScoreBtn.textContent = 'View Leaderboard';
      submitScoreBtn.onclick = showLeaderboard;
    }

    function startGame() {
      player1.score = 0; player2.score = 0;
      player1.y = canvas.height/2 - paddleHeight/2;
      player2.y = canvas.height/2 - paddleHeight/2;
      p1ScoreEl.textContent = '0'; p2ScoreEl.textContent = '0';
      gameOverDiv.style.display = 'none';
      startBtn.style.display = 'inline-block';
      resetBall();
      gameRunning = true;
      gameLoop();
    }

    const keys = {};
    document.addEventListener('keydown', e => { keys[e.key] = true; if(e.key==='w'||e.key==='s'||e.key==='ArrowUp'||e.key==='ArrowDown') e.preventDefault(); });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    function handleInput() {
      if (!gameRunning) return;
      player1.dy = 0;
      player2.dy = 0;
      if (keys['w'] || keys['W']) player1.dy = -6;
      if (keys['s'] || keys['S']) player1.dy = 6;
      if (keys['ArrowUp']) player2.dy = -6;
      if (keys['ArrowDown']) player2.dy = 6;
    }

    setInterval(handleInput, 16);

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
    backBtn.addEventListener('click', () => window.location.href = 'index.html');
    submitScoreBtn.addEventListener('click', submitScore);
    playerNameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && playerNameInput.value.trim()) submitScore();
    });
    playerNameInput.addEventListener('input', () => {
      submitScoreBtn.disabled = !playerNameInput.value.trim();
      submitScoreBtn.style.opacity = playerNameInput.value.trim() ? '1' : '0.5';
    });
    gameModeSelect.addEventListener('change', () => {
      isAI = gameModeSelect.value === 'ai';
    });

    function submitScore() {
      const name = playerNameInput.value.trim();
      if (!name) return;
      const leaderboard = Leaderboard.addScore(GAME_NAME, name, player1.score);
      nameInputContainer.style.display = 'none';
      leaderboardContainer.style.display = 'block';
      leaderboardContainer.innerHTML = '<h3 style="color: #e94560; margin-bottom: 10px;">Top 10 Players</h3>' + Leaderboard.render(GAME_NAME);
      submitScoreBtn.textContent = 'View Leaderboard';
      submitScoreBtn.onclick = showLeaderboard;
    }

    function showLeaderboard() {
      leaderboardContainer.style.display = 'block';
      submitScoreBtn.textContent = 'View Leaderboard';
      submitScoreBtn.onclick = showLeaderboard;
    }

    draw();
  </script>
</body>
</html>
