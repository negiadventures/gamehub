<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --game-accent: #00ff88;
      --game-accent-rgb: 0, 255, 136;
    }
  </style>
</head>
<body>
  <h1 class="game-title">Snake</h1>

  <div class="game-info-bar">
    <div><span class="info-label">Score</span><span class="info-value" id="score">0</span></div>
    <div><span class="info-label">High Score</span><span class="info-value" id="highScore">0</span></div>
  </div>
  <div id="raceScorePanel" class="hidden" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;justify-content:center;"></div>

  <canvas id="gameCanvas" class="game-canvas-border" width="400" height="400"></canvas>

  <div class="controls-hint">
    <p>Use <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> or <kbd>Arrow Keys</kbd> to move</p>
    <p>Press <kbd>Space</kbd> to pause</p>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="startBtn">Start Game</button>
    <button class="btn btn-back btn-sm" id="backBtn">← Hub</button>
  </div>

  <div class="gh-modal-backdrop hidden" id="gameOver">
    <div class="gh-modal">
      <h2 id="winnerText">Game Over!</h2>
      <p class="score-label">Score: <span id="finalScore">0</span></p>
      <div id="raceResults" class="hidden" style="margin-bottom:14px;font-size:.95rem;line-height:1.8;"></div>
      <div id="nameInputContainer" class="name-input-wrap">
        <input type="text" id="playerName" placeholder="Enter your name" maxlength="15" />
      </div>
      <div id="leaderboardContainer" class="leaderboard-wrap hidden"></div>
      <div class="btn-row" style="justify-content:center;">
        <button class="btn btn-primary" id="submitScoreBtn" disabled>Submit Score</button>
        <button class="btn btn-secondary" id="restartBtn">Play Again</button>
      </div>
    </div>
  </div>

  <script src="leaderboard.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="multiplayer.js"></script>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const highScoreElement = document.getElementById('highScore');
    const finalScoreElement = document.getElementById('finalScore');
    const gameOverDiv = document.getElementById('gameOver');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const backBtn = document.getElementById('backBtn');
    const playerNameInput = document.getElementById('playerName');
    const submitScoreBtn = document.getElementById('submitScoreBtn');
    const nameInputContainer = document.getElementById('nameInputContainer');
    const leaderboardContainer = document.getElementById('leaderboardContainer');
    const GAME_NAME = 'snake';

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [];
    let food = {};
    let direction = { x: 0, y: 0 };
    let nextDirection = { x: 0, y: 0 };
    let score = 0;
    let highScore = localStorage.getItem('snakeHighScore') || 0;
    let gameLoop = null;
    let gameSpeed = 100;
    let isPaused = false;
    let isGameRunning = false;

    highScoreElement.textContent = highScore;

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      gameSpeed = 100;
      isPaused = false;
      scoreElement.textContent = score;
      gameOverDiv.classList.add('hidden');
      spawnFood();
    }

    function spawnFood() {
      do {
        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
    }

    function draw() {
      // Clear canvas
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw grid (subtle)
      ctx.strokeStyle = '#2a2a3e';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }

      // Draw food
      ctx.fillStyle = '#ff4444';
      ctx.shadowColor = '#ff4444';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(
        food.x * gridSize + gridSize / 2,
        food.y * gridSize + gridSize / 2,
        gridSize / 2 - 2,
        0,
        Math.PI * 2
      );
      ctx.fill();
      ctx.shadowBlur = 0;

      // Draw snake
      snake.forEach((segment, index) => {
        const gradient = ctx.createLinearGradient(
          segment.x * gridSize,
          segment.y * gridSize,
          (segment.x + 1) * gridSize,
          (segment.y + 1) * gridSize
        );

        if (index === 0) {
          // Head
          gradient.addColorStop(0, '#00ff88');
          gradient.addColorStop(1, '#00cc6a');
          ctx.shadowColor = '#00ff88';
          ctx.shadowBlur = 10;
        } else {
          // Body
          const alpha = 1 - (index / snake.length) * 0.5;
          gradient.addColorStop(0, `rgba(0, 255, 136, ${alpha})`);
          gradient.addColorStop(1, `rgba(0, 200, 100, ${alpha})`);
          ctx.shadowBlur = 0;
        }

        ctx.fillStyle = gradient;
        ctx.fillRect(
          segment.x * gridSize + 1,
          segment.y * gridSize + 1,
          gridSize - 2,
          gridSize - 2
        );
      });

      ctx.shadowBlur = 0;
    }

    function update() {
      if (isPaused) return;

      direction = { ...nextDirection };

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      // Check wall collision
      if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
        gameOver();
        return;
      }

      // Check self collision
      if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        gameOver();
        return;
      }

      snake.unshift(head);

      // Check food collision
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreElement.textContent = score;
        broadcastScore();

        // Increase speed every 50 points
        if (score % 50 === 0 && gameSpeed > 50) {
          gameSpeed -= 10;
          clearInterval(gameLoop);
          gameLoop = setInterval(update, gameSpeed);
        }

        spawnFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function gameOver() {
      isGameRunning = false;
      clearInterval(gameLoop);
      broadcastFinalScore();

      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
        highScoreElement.textContent = highScore;
      }

      // Find and set final score
      const finalScoreEl = document.getElementById('finalScore');
      if (finalScoreEl) {
        finalScoreEl.textContent = score;
      }
      gameOverDiv.classList.remove('hidden');
      startBtn.textContent = 'Start Game';

      if (onlineMode) {
        nameInputContainer.style.display = 'none';
        return;
      }

      playerNameInput.value = '';
      nameInputContainer.style.display = 'block';
      submitScoreBtn.disabled = true;
      submitScoreBtn.style.opacity = '0.5';
      // Show leaderboard if there are existing scores
      const existingLeaderboard = Leaderboard.get(GAME_NAME);
      if (existingLeaderboard && existingLeaderboard.length > 0) {
        leaderboardContainer.classList.remove('hidden');
        leaderboardContainer.innerHTML = '<h3 style="color: #00ff88; margin-bottom: 10px;">Top 10 Players</h3>' + Leaderboard.render(GAME_NAME);
        submitScoreBtn.textContent = 'View Leaderboard';
        submitScoreBtn.onclick = showLeaderboard;
      } else {
        leaderboardContainer.classList.add('hidden');
        submitScoreBtn.textContent = 'Submit Score';
        submitScoreBtn.onclick = submitScore;
      }
    }

    function showLeaderboard() {
      leaderboardContainer.classList.remove('hidden');
      submitScoreBtn.textContent = 'View Leaderboard';
      submitScoreBtn.onclick = showLeaderboard;
    }

    function startGame() {
      if (isGameRunning) return;

      initGame();
      isGameRunning = true;
      startBtn.textContent = 'Restart Game';
      gameLoop = setInterval(update, gameSpeed);
    }

    function togglePause() {
      if (!isGameRunning) return;

      isPaused = !isPaused;
      if (isPaused) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = '30px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
      } else {
        draw();
      }
    }

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        togglePause();
        return;
      }

      if (!isGameRunning || isPaused) return;

      switch (e.code) {
        case 'ArrowUp':
        case 'KeyW':
          if (direction.y !== 1) {
            nextDirection = { x: 0, y: -1 };
          }
          break;
        case 'ArrowDown':
        case 'KeyS':
          if (direction.y !== -1) {
            nextDirection = { x: 0, y: 1 };
          }
          break;
        case 'ArrowLeft':
        case 'KeyA':
          if (direction.x !== 1) {
            nextDirection = { x: -1, y: 0 };
          }
          break;
        case 'ArrowRight':
        case 'KeyD':
          if (direction.x !== -1) {
            nextDirection = { x: 1, y: 0 };
          }
          break;
      }
    });

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
    backBtn.addEventListener('click', () => window.location.href = 'index.html');
    submitScoreBtn.addEventListener('click', submitScore);
    playerNameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && playerNameInput.value.trim()) submitScore();
    });
    playerNameInput.addEventListener('input', () => {
      submitScoreBtn.disabled = !playerNameInput.value.trim();
      submitScoreBtn.style.opacity = playerNameInput.value.trim() ? '1' : '0.5';
    });

    function submitScore() {
      const name = playerNameInput.value.trim();
      if (!name) return;
      const leaderboard = Leaderboard.addScore(GAME_NAME, name, score);
      nameInputContainer.style.display = 'none';
      leaderboardContainer.classList.remove('hidden');
      leaderboardContainer.innerHTML = '<h3 style="color: #00ff88; margin-bottom: 10px;">Top 10 Players</h3>' + Leaderboard.render(GAME_NAME);
      submitScoreBtn.textContent = 'View Leaderboard';
      submitScoreBtn.onclick = showLeaderboard;
    }

    // Initial draw
    draw();

    // ── Online / Score-Race Mode ──────────────────────────────────────────────
    function checkOnlineMode() {
      const s = sessionStorage.getItem('gh_room');
      if (!s) return false;
      try { const d = JSON.parse(s); return d.gameType === GAME_NAME ? d : false; }
      catch(e) { return false; }
    }
    const sessionData = checkOnlineMode();
    let onlineMode = false;
    let ghRoom = null;
    let onlinePlayers = [];
    let raceScores = {};

    if (sessionData) {
      onlineMode = true;
      onlinePlayers = sessionData.players || [];
      onlinePlayers.forEach(p => { raceScores[p.id] = { name: p.name || 'Player', avatar: p.avatar || '🎮', score: 0, done: false }; });
      ghRoom = new GameRoom();
      if (sessionData.role === 'host') {
        ghRoom.create(GAME_NAME, sessionData.settings || {}, onRoomEvent, sessionData.code);
      } else {
        ghRoom.join(sessionData.code, sessionData.player, onRoomEvent);
      }
      document.getElementById('raceScorePanel').classList.remove('hidden');
    }

    function onRoomEvent(event, data) {
      if (event === 'room-update') {
        onlinePlayers = data.players || onlinePlayers;
        onlinePlayers.forEach(p => {
          if (!raceScores[p.id]) raceScores[p.id] = { name: p.name || 'Player', avatar: p.avatar || '🎮', score: 0, done: false };
        });
        renderRaceScores();
      }
      if (event === 'game-move') {
        const d = data.data;
        if (d.type === 'score-update') {
          if (raceScores[d.playerId]) raceScores[d.playerId].score = d.score;
          renderRaceScores();
        }
        if (d.type === 'final-score') {
          if (raceScores[d.playerId]) { raceScores[d.playerId].score = d.score; raceScores[d.playerId].done = true; }
          renderRaceScores();
          checkAllDone();
        }
      }
      if (event === 'player-left') {
        if (raceScores[data.playerId]) raceScores[data.playerId].done = true;
        checkAllDone();
      }
    }

    function broadcastScore() {
      if (!onlineMode || !ghRoom) return;
      ghRoom.sendMove({ type: 'score-update', playerId: ghRoom.myPlayer.id, score: score });
    }

    function broadcastFinalScore() {
      if (!onlineMode || !ghRoom) return;
      const myId = ghRoom.myPlayer.id;
      ghRoom.sendMove({ type: 'final-score', playerId: myId, score: score });
      if (raceScores[myId]) { raceScores[myId].score = score; raceScores[myId].done = true; }
      renderRaceScores();
      checkAllDone();
    }

    function checkAllDone() {
      if (!onlineMode) return;
      const allDone = Object.values(raceScores).every(p => p.done);
      if (allDone) showRaceResults();
    }

    function showRaceResults() {
      const sorted = Object.entries(raceScores).sort((a, b) => b[1].score - a[1].score);
      const myId = ghRoom && ghRoom.myPlayer ? ghRoom.myPlayer.id : null;
      const winner = sorted[0];
      const isWinner = myId && winner[0] === myId;
      const raceResultsEl = document.getElementById('raceResults');
      if (raceResultsEl) {
        raceResultsEl.innerHTML = '<strong>Race Results:</strong><br>' + sorted.map(([id, p], i) =>
          `${['🥇','🥈','🥉'][i]||((i+1)+'.')} ${p.avatar} ${esc(p.name)}: ${p.score}${id===myId?' (you)':''}`
        ).join('<br>');
        raceResultsEl.classList.remove('hidden');
      }
      const winnerTextEl = document.getElementById('winnerText');
      if (winnerTextEl) winnerTextEl.textContent = isWinner ? '🏆 You Win!' : `${winner[1].avatar} ${winner[1].name} Wins!`;
      const gameOverEl = document.getElementById('gameOver');
      if (gameOverEl) gameOverEl.classList.remove('hidden');
    }

    function renderRaceScores() {
      if (!onlineMode) return;
      const container = document.getElementById('raceScorePanel');
      if (!container) return;
      const myId = ghRoom && ghRoom.myPlayer ? ghRoom.myPlayer.id : null;
      container.innerHTML = Object.entries(raceScores)
        .sort((a,b) => b[1].score - a[1].score)
        .map(([id, p]) => `
        <div class="player-pill${id === myId ? '" style="border-color:var(--game-accent)' : ''}">
          <span class="avatar">${p.avatar}</span>
          <span class="player-name">${esc(p.name)}</span>
          <span class="player-score">${p.score}${p.done ? ' ✓' : ''}</span>
        </div>
      `).join('');
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
</html>
