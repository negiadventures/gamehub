<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copter Game</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --game-accent: #00d4ff;
      --game-accent-rgb: 0, 212, 255;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }
    h1 { color: #00d4ff; margin-bottom: 10px; font-size: 2rem; text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); }
    .game-info { display: flex; gap: 30px; margin-bottom: 10px; font-size: 1.1rem; color: #fff; }
    .game-info span { color: #00d4ff; font-weight: bold; }
    #gameCanvas {
      border: 3px solid #00d4ff;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
      cursor: pointer;
    }
    .instructions { margin-top: 15px; color: #aaa; text-align: center; font-size: 0.9rem; }
    .instructions kbd { background: #333; padding: 3px 8px; border-radius: 4px; border: 1px solid #555; font-family: monospace; color: #00d4ff; }
    #startBtn { margin-top: 15px; padding: 12px 32px; font-size: 1rem; font-weight: 700; background: #00d4ff; color: #0c0c0c; border: none; border-radius: 50px; cursor: pointer; transition: all 0.25s ease; }
    #startBtn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
    .game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.9); padding: 35px 50px; border-radius: 15px; border: 2px solid #ff4444; text-align: center; display: none; }
    .game-over h2 { color: #ff4444; font-size: 1.8rem; margin-bottom: 15px; }
    .game-over p { color: #fff; font-size: 1.1rem; margin-bottom: 15px; }
    .game-over button { padding: 12px 32px; font-size: 1rem; font-weight: 700; background: #00d4ff; color: #0c0c0c; border: none; border-radius: 50px; cursor: pointer; transition: all 0.25s ease; margin: 5px; }
    #backBtn { margin-top: 10px; padding: 9px 22px; font-size: 0.9rem; font-weight: 700; background: #444; color: #fff; border: none; border-radius: 50px; cursor: pointer; transition: all 0.25s ease; }
    #backBtn:hover { background: #555; }
    .pause-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 30px 50px; border-radius: 10px; border: 2px solid #00d4ff; text-align: center; display: none; }
    .pause-overlay h2 { color: #00d4ff; font-size: 2rem; }
    #nameInputContainer { margin-bottom: 20px; }
    #nameInputContainer input { padding: 10px; font-size: 1rem; border-radius: 10px; border: none; width: 200px; text-align: center; }
    #leaderboardContainer { display: none; margin-bottom: 20px; }
    .leaderboard-table { width: 100%; color: #fff; border-collapse: collapse; margin-top: 10px; }
    .leaderboard-table th { color: #00d4ff; padding: 8px; border-bottom: 1px solid #444; text-align: left; }
    .leaderboard-table td { padding: 8px; border-bottom: 1px solid #333; }
    .leaderboard-table tr:first-child td:first-child { color: #FFD700; }
    .leaderboard-table tr:nth-child(2) td:first-child { color: #C0C0C0; }
    .leaderboard-table tr:nth-child(3) td:first-child { color: #CD7F32; }
  </style>
</head>
<body>
  <h1>Copter Game</h1>
  <div class="game-info">
    <div>Score: <span id="score">0</span></div>
    <div>High Score: <span id="highScore">0</span></div>
  </div>
  <canvas id="gameCanvas" width="400" height="600"></canvas>
  <div class="instructions">
    <p><kbd>Click</kbd> or <kbd>Hold Space</kbd> to fly up | <kbd>Release</kbd> to fall | Avoid the planes!</p>
  </div>
  <button id="startBtn">Start Game</button>
  <button id="backBtn">Back to Hub</button>
  <div class="game-over" id="gameOver">
    <h2>Game Over!</h2>
    <p>Score: <span id="finalScore">0</span></p>
    <div id="nameInputContainer" style="margin-bottom: 20px;">
      <input type="text" id="playerName" placeholder="Enter your name" maxlength="15" style="padding: 10px; font-size: 1rem; border-radius: 10px; border: none; width: 200px; text-align: center;">
    </div>
    <div id="leaderboardContainer" style="display: none; margin-bottom: 20px;"></div>
    <button id="submitScoreBtn" style="margin-bottom: 10px;">Submit Score</button>
    <button id="restartBtn">Play Again</button>
  </div>
  <div class="pause-overlay" id="pauseOverlay">
    <h2>PAUSED</h2>
  </div>
  <script src="leaderboard.js"></script>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const highScoreElement = document.getElementById('highScore');
    const finalScoreElement = document.getElementById('finalScore');
    const gameOverDiv = document.getElementById('gameOver');
    const pauseOverlay = document.getElementById('pauseOverlay');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const submitScoreBtn = document.getElementById('submitScoreBtn');
    const playerNameInput = document.getElementById('playerName');
    const nameInputContainer = document.getElementById('nameInputContainer');
    const leaderboardContainer = document.getElementById('leaderboardContainer');
    const backBtn = document.getElementById('backBtn');
    const GAME_NAME = 'copter';

    const gravity = 0.2;
    const lift = -4;
    const obstacleSpeed = 3;
    const obstacleGap = 180;
    const obstacleWidth = 70;
    const obstacleSpawnRate = 100;

    let copter = {};
    let obstacles = [];
    let score = 0;
    let highScore = localStorage.getItem('copterHighScore') || 0;
    let gameLoop = null;
    let frameCount = 0;
    let isGameRunning = false;
    let isPaused = false;
    let isHolding = false;
    let velocity = 0;

    highScoreElement.textContent = highScore;

    function initGame() {
      copter = { x: 80, y: canvas.height / 2, width: 40, height: 30, rotation: 0 };
      obstacles = [];
      score = 0;
      velocity = 0;
      frameCount = 0;
      isPaused = false;
      isHolding = false;
      scoreElement.textContent = score;
      gameOverDiv.style.display = 'none';
      pauseOverlay.style.display = 'none';
    }

    function drawCopter() {
      ctx.save();
      ctx.translate(copter.x + copter.width / 2, copter.y + copter.height / 2);
      ctx.rotate(copter.rotation);
      ctx.fillStyle = '#00d4ff';
      ctx.beginPath();
      ctx.ellipse(0, 0, copter.width / 2, copter.height / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#0099cc';
      ctx.beginPath();
      ctx.ellipse(5, 2, copter.width / 2 - 3, copter.height / 2 - 2, 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#aaddff';
      ctx.beginPath();
      ctx.ellipse(8, -5, 12, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = '#0088aa';
      ctx.fillRect(-copter.width / 2 - 8, -5, 8, 10);
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-copter.width / 2 - 5, 0);
      ctx.lineTo(copter.width / 2 + 5, 0);
      ctx.stroke();
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-copter.width / 2 - 5, 0);
      ctx.lineTo(copter.width / 2 + 5, 0);
      ctx.stroke();
      ctx.restore();
    }

    function drawAirplane(x, y, width, height, isTop) {
      ctx.save();
      ctx.translate(x + width / 2, y);
      ctx.fillStyle = '#ff6b35';
      ctx.beginPath();
      ctx.ellipse(0, 0, width / 2, height / 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff8c5a';
      ctx.beginPath();
      ctx.ellipse(isTop ? -width / 2 + 5 : width / 2 - 5, 0, width / 4, height / 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#cc5520';
      ctx.beginPath();
      ctx.moveTo(-5, -5);
      ctx.lineTo(-20, -height);
      ctx.lineTo(5, -5);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(5, 5);
      ctx.lineTo(20, height);
      ctx.lineTo(-5, 5);
      ctx.fill();
      ctx.fillStyle = '#ff4400';
      ctx.beginPath();
      ctx.moveTo(-width / 2 + 5, 0);
      ctx.lineTo(-width / 2 - 8, -height / 2);
      ctx.lineTo(-width / 2 + 10, 0);
      ctx.fill();
      ctx.fillStyle = '#88ccff';
      ctx.beginPath();
      ctx.ellipse(isTop ? width / 4 : -width / 4, -height / 6, 8, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffff00';
      ctx.beginPath();
      ctx.arc(-width / 2, -height / 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(width / 2, height / 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawObstacles() {
      obstacles.forEach(obs => {
        if (!obs || typeof obs.x !== 'number' || !isFinite(obs.x)) return;
        drawAirplane(obs.x, 0, obstacleWidth, 40, true);
        drawAirplane(obs.x, obs.bottomY, obstacleWidth, 40, false);
      });
    }

    function drawBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, '#1a1a2e');
      gradient.addColorStop(0.5, '#16213e');
      gradient.addColorStop(1, '#0f3460');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ffffff';
      for (let i = 0; i < 50; i++) {
        const x = ((i * 73 + frameCount * 0.2) % canvas.width + canvas.width) % canvas.width;
        const y = (i * 47) % canvas.height;
        const size = (i % 2) + 1;
        const opacity = 0.3 + (i % 3) * 0.2;
        ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
        ctx.fillRect(x, y, size, size);
      }
      ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
      for (let i = 0; i < 8; i++) {
        const x = ((i * 100) - frameCount * 0.1) % (canvas.width + 200);
        const y = (i * 80 + 50) % canvas.height;
        const adjustedX = x < -100 ? x + canvas.width + 200 : x;
        ctx.beginPath();
        ctx.arc(adjustedX, y, 40, 0, Math.PI * 2);
        ctx.arc(adjustedX + 50, y - 10, 50, 0, Math.PI * 2);
        ctx.arc(adjustedX + 100, y, 40, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function update() {
      if (isPaused) return;
      frameCount++;
      if (isHolding) { velocity += lift * 0.1; } else { velocity += gravity; }
      velocity = Math.max(Math.min(velocity, 4), -4);
      copter.y += velocity;
      copter.rotation = Math.max(Math.min(velocity * 0.15, 0.5), -0.5);
      if (copter.y < 0) { copter.y = 0; velocity = 0; }
      if (copter.y + copter.height > canvas.height) { gameOver(); return; }
      if (frameCount % obstacleSpawnRate === 0) {
        const minHeight = 80;
        const maxHeight = canvas.height - obstacleGap - minHeight;
        const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
        obstacles.push({ x: canvas.width, topHeight: topHeight, bottomY: topHeight + obstacleGap, passed: false });
      }
      obstacles.forEach(obs => { obs.x -= obstacleSpeed; });
      obstacles = obstacles.filter(obs => obs.x + obstacleWidth > -150);
      obstacles.forEach(obs => {
        if (!obs || typeof obs.x !== 'number' || !isFinite(obs.x) || !isFinite(obs.bottomY)) return;
        if (copter.x + copter.width > obs.x && copter.x < obs.x + obstacleWidth) {
          if (copter.y < 40 || copter.y + copter.height > obs.bottomY) { gameOver(); }
        }
        if (!obs.passed && obs.x + obstacleWidth < copter.x) { obs.passed = true; score++; scoreElement.textContent = score; }
      });
      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      drawObstacles();
      drawCopter();
    }

    function gameOver() {
      isGameRunning = false;
      clearInterval(gameLoop);
      if (score > highScore) { highScore = score; localStorage.setItem('copterHighScore', highScore); highScoreElement.textContent = highScore; }
      finalScoreElement.textContent = score;
      gameOverDiv.style.display = 'block';
      startBtn.style.display = 'none';
      playerNameInput.value = '';
      nameInputContainer.style.display = 'block';
      submitScoreBtn.disabled = true;
      submitScoreBtn.style.opacity = '0.5';
      // Show leaderboard if there are existing scores
      const existingLeaderboard = Leaderboard.get(GAME_NAME);
      if (existingLeaderboard && existingLeaderboard.length > 0) {
        leaderboardContainer.style.display = 'block';
        leaderboardContainer.innerHTML = '<h3 style="color: #00d4ff; margin-bottom: 10px;">Top 10 Players</h3>' + Leaderboard.render(GAME_NAME);
        submitScoreBtn.textContent = 'View Leaderboard';
        submitScoreBtn.onclick = showLeaderboard;
      } else {
        leaderboardContainer.style.display = 'none';
        submitScoreBtn.textContent = 'Submit Score';
        submitScoreBtn.onclick = submitScore;
      }
    }

    function showLeaderboard() {
      leaderboardContainer.style.display = 'block';
      submitScoreBtn.textContent = 'View Leaderboard';
      submitScoreBtn.onclick = showLeaderboard;
    }

    function startGame() {
      if (isGameRunning) return;
      initGame();
      isGameRunning = true;
      startBtn.style.display = 'none';
      gameLoop = setInterval(update, 1000 / 60);
    }

    function togglePause() {
      if (!isGameRunning) return;
      isPaused = !isPaused;
      if (isPaused) { pauseOverlay.style.display = 'block'; } else { pauseOverlay.style.display = 'none'; }
    }

    function handleHoldStart(e) { if (e) e.preventDefault(); if (!isGameRunning || isPaused) return; isHolding = true; }
    function handleHoldEnd(e) { if (e) e.preventDefault(); isHolding = false; }

    canvas.addEventListener('mousedown', handleHoldStart);
    canvas.addEventListener('mouseup', handleHoldEnd);
    canvas.addEventListener('mouseleave', handleHoldEnd);
    canvas.addEventListener('touchstart', handleHoldStart, { passive: false });
    canvas.addEventListener('touchend', handleHoldEnd, { passive: false });

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') { e.preventDefault(); if (!isGameRunning && gameOverDiv.style.display === 'none') { startGame(); } else if (isGameRunning) { handleHoldStart(e); } }
      if (e.code === 'KeyP') { togglePause(); }
    });
    document.addEventListener('keyup', (e) => { if (e.code === 'Space') { handleHoldEnd(e); } });

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
    backBtn.addEventListener('click', () => window.location.href = 'index.html');
    submitScoreBtn.addEventListener('click', submitScore);
    playerNameInput.addEventListener('input', () => { submitScoreBtn.disabled = !playerNameInput.value.trim(); submitScoreBtn.style.opacity = submitScoreBtn.disabled ? '0.5' : '1'; });

    function submitScore() {
      const name = playerNameInput.value.trim();
      if (!name) return;
      const leaderboard = Leaderboard.addScore(GAME_NAME, name, score);
      nameInputContainer.style.display = 'none';
      leaderboardContainer.style.display = 'block';
      leaderboardContainer.innerHTML = '<h3 style="color: #00d4ff; margin-bottom: 10px;">Top 10 Players</h3>' + Leaderboard.render(GAME_NAME);
      submitScoreBtn.textContent = 'View Leaderboard';
      submitScoreBtn.onclick = showLeaderboard;
    }

    function showLeaderboard() {
      leaderboardContainer.style.display = 'block';
      submitScoreBtn.textContent = 'View Leaderboard';
      submitScoreBtn.onclick = showLeaderboard;
    }

    drawBackground();
    drawCopter();
  </script>
</body>
</html>
