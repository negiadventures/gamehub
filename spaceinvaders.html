<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Space Invaders - Game Hub</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --game-accent: #aa44ff;
      --game-accent-rgb: 170, 68, 255;
    }
    #gameCanvas { cursor: none; }
  </style>
</head>
<body>
  <h1 class="game-title">Space Invaders</h1>
  <div class="game-info-bar">
    <div><span class="info-label">Score</span><span class="info-value" id="score">0</span></div>
    <div><span class="info-label">High Score</span><span class="info-value" id="highScore">0</span></div>
    <div><span class="info-label">Level</span><span class="info-value" id="level">1</span></div>
  </div>
  <div class="canvas-wrap">
    <canvas id="gameCanvas" class="game-canvas-border" width="600" height="500"></canvas>
    <div class="pause-overlay hidden" id="pauseOverlay">
      <h2>PAUSED</h2>
    </div>
  </div>
  <div class="controls-hint">
    <p><kbd>Left</kbd>/<kbd>Right</kbd> to move | <kbd>Space</kbd> to shoot | <kbd>P</kbd> to pause</p>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="startBtn">Start Game</button>
    <button class="btn btn-back btn-sm" id="backBtn">← Hub</button>
  </div>
  <div class="gh-modal-backdrop hidden" id="gameOver">
    <div class="gh-modal">
      <h2 id="gameOverText">Game Over!</h2>
      <p class="score-label">Score: <span id="finalScore">0</span></p>
      <div id="nameInputContainer" class="name-input-wrap">
        <input type="text" id="playerName" placeholder="Enter your name" maxlength="15" />
      </div>
      <div id="leaderboardContainer" class="leaderboard-wrap hidden"></div>
      <div class="btn-row" style="justify-content:center;">
        <button class="btn btn-primary" id="submitScoreBtn" disabled>Submit Score</button>
        <button class="btn btn-secondary" id="restartBtn">Play Again</button>
      </div>
    </div>
  </div>
  <script src="leaderboard.js"></script>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const levelEl = document.getElementById('level');
    const gameOverDiv = document.getElementById('gameOver');
    const gameOverText = document.getElementById('gameOverText');
    const finalScoreEl = document.getElementById('finalScore');
    const pauseOverlay = document.getElementById('pauseOverlay');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const backBtn = document.getElementById('backBtn');
    const playerNameInput = document.getElementById('playerName');
    const submitScoreBtn = document.getElementById('submitScoreBtn');
    const nameInputContainer = document.getElementById('nameInputContainer');
    const leaderboardContainer = document.getElementById('leaderboardContainer');
    const GAME_NAME = 'spaceinvaders';

    const playerWidth = 50, playerHeight = 20;
    const bulletWidth = 4, bulletHeight = 10;
    const alienWidth = 30, alienHeight = 20;
    const alienRows = 4, alienCols = 8;
    const alienPadding = 15, alienOffsetTop = 50, alienOffsetLeft = 40;

    let score = 0, highScore = localStorage.getItem('spaceInvadersHighScore') || 0;
    let level = 1, gameRunning = false, isPaused = false, animationId;

    highScoreEl.textContent = highScore;

    const player = { x: canvas.width/2 - playerWidth/2, y: canvas.height - 40, speed: 5, dx: 0 };
    let bullets = [];
    let aliens = [];
    let alienDirection = 1;
    let alienSpeed = 1;
    let alienDrop = false;

    function initAliens() {
      aliens = [];
      const colors = ['#44ff44', '#44ff88', '#88ff44', '#aaff44'];
      for (let r = 0; r < alienRows; r++) {
        for (let c = 0; c < alienCols; c++) {
          aliens.push({ x: c * (alienWidth + alienPadding) + alienOffsetLeft, y: r * (alienHeight + alienPadding) + alienOffsetTop, alive: true, color: colors[r] });
        }
      }
    }

    function drawRect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function draw() {
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw stars
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 30; i++) {
        const x = ((i * 73) % canvas.width);
        const y = ((i * 47 + frameCount) % canvas.height);
        ctx.fillRect(x, y, 2, 2);
      }

      // Draw player
      drawRect(player.x, player.y, playerWidth, playerHeight, '#aa44ff');
      drawRect(player.x + 18, player.y - 10, 14, 10, '#cc88ff');

      // Draw bullets
      ctx.fillStyle = '#ffdd44';
      bullets.forEach(b => drawRect(b.x, b.y, bulletWidth, bulletHeight, '#ffdd44'));

      // Draw aliens
      aliens.forEach(a => {
        if (a.alive) {
          drawRect(a.x, a.y, alienWidth, alienHeight, a.color);
          drawRect(a.x + 5, a.y + 5, 5, 5, '#000');
          drawRect(a.x + alienWidth - 10, a.y + 5, 5, 5, '#000');
        }
      });

      if (isPaused) pauseOverlay.classList.remove('hidden');
      else pauseOverlay.classList.add('hidden');
    }

    let frameCount = 0;
    function update() {
      frameCount++;

      player.x += player.dx;
      player.x = Math.max(0, Math.min(canvas.width - playerWidth, player.x));

      bullets.forEach(b => b.y -= 7);
      bullets = bullets.filter(b => b.y > -10);

      if (frameCount % 60 === 0) {
        alienSpeed = 1 + level * 0.3;
        alienDirection *= -1;
      }

      let shouldDrop = false;
      aliens.forEach(a => {
        if (a.alive) {
          a.x += alienSpeed * alienDirection;
          if ((alienDirection === 1 && a.x + alienWidth > canvas.width - 10) || (alienDirection === -1 && a.x < 10)) shouldDrop = true;

          if (a.y + alienHeight >= player.y) endGame(false);
        }
      });

      if (shouldDrop) {
        alienDirection *= -1;
        aliens.forEach(a => { if (a.alive) a.y += 20; });
      }

      bullets.forEach(b => {
        aliens.forEach(a => {
          if (a.alive && b.x < a.x + alienWidth && b.x + bulletWidth > a.x && b.y < a.y + alienHeight && b.y + bulletHeight > a.y) {
            a.alive = false;
            b.hit = true;
            score += 10 * level;
            scoreEl.textContent = score;
          }
        });
      });

      bullets = bullets.filter(b => !b.hit && b.y > -10);

      if (aliens.every(a => !a.alive)) {
        level++;
        levelEl.textContent = level;
        initAliens();
        alienSpeed = 1 + level * 0.3;
        bullets = [];
      }

      if (frameCount % 120 === 0 && Math.random() < 0.3) {
        aliens.filter(a => a.alive).forEach(a => {
          if (Math.random() < 0.3) {
            bullets.push({ x: a.x + alienWidth/2, y: a.y + alienHeight, hit: false });
          }
        });
      }

      bullets.forEach(b => {
        aliens.forEach(a => {
          if (a.alive && b.x < a.x + alienWidth && b.x + bulletWidth > a.x && b.y < a.y + alienHeight && b.y + bulletHeight > a.y) {
            a.alive = false;
            b.hit = true;
            score += 10 * level;
            scoreEl.textContent = score;
          }
        });
      });
    }

    function gameLoop() {
      if (!gameRunning || isPaused) return;
      update();
      draw();
      animationId = requestAnimationFrame(gameLoop);
    }

    function endGame(win) {
      gameRunning = false;
      cancelAnimationFrame(animationId);
      gameOverText.textContent = win ? 'You Win!' : 'Game Over!';
      finalScoreEl.textContent = score;
      gameOverDiv.classList.remove('hidden');
      startBtn.classList.add('hidden');
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('spaceInvadersHighScore', highScore);
        highScoreEl.textContent = highScore;
      }

      playerNameInput.value = '';
      nameInputContainer.classList.remove('hidden');
      submitScoreBtn.disabled = true;
      // Show leaderboard if there are existing scores
      const existingLeaderboard = Leaderboard.get(GAME_NAME);
      if (existingLeaderboard && existingLeaderboard.length > 0) {
        leaderboardContainer.classList.remove('hidden');
        leaderboardContainer.innerHTML = '<h3 class="text-accent" style="margin-bottom:10px;">Top 10 Players</h3>' + Leaderboard.render(GAME_NAME);
        submitScoreBtn.textContent = 'View Leaderboard';
        submitScoreBtn.onclick = showLeaderboard;
      } else {
        leaderboardContainer.classList.add('hidden');
        submitScoreBtn.textContent = 'Submit Score';
        submitScoreBtn.onclick = submitScore;
      }
    }

    function showLeaderboard() {
      leaderboardContainer.classList.remove('hidden');
      submitScoreBtn.textContent = 'View Leaderboard';
      submitScoreBtn.onclick = showLeaderboard;
    }

    function startGame() {
      score = 0; level = 1;
      scoreEl.textContent = '0'; levelEl.textContent = '1';
      gameOverDiv.classList.add('hidden');
      startBtn.classList.remove('hidden');
      player.x = canvas.width/2 - playerWidth/2;
      bullets = [];
      initAliens();
      alienDirection = 1;
      alienSpeed = 1;
      frameCount = 0;
      gameRunning = true;
      isPaused = false;
      gameLoop();
    }

    const keys = {};
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if(e.key==='ArrowLeft'||e.key==='ArrowRight'||e.key===' ') e.preventDefault();
    });
    document.addEventListener('keyup', e => {
      keys[e.key] = false;
      if (e.key === 'KeyP') togglePause();
    });

    function togglePause() {
      if (!gameRunning) return;
      isPaused = !isPaused;
    }

    function handleInput() {
      if (!gameRunning || isPaused) return;
      player.dx = 0;
      if (keys['ArrowLeft']) player.dx = -player.speed;
      if (keys['ArrowRight']) player.dx = player.speed;
    }

    setInterval(handleInput, 16);

    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && gameRunning && !isPaused) {
        e.preventDefault();
        if (bullets.length < 3) bullets.push({ x: player.x + playerWidth/2 - bulletWidth/2, y: player.y, hit: false });
      }
    });

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
    backBtn.addEventListener('click', () => window.location.href = 'index.html');
    submitScoreBtn.addEventListener('click', submitScore);
    playerNameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && playerNameInput.value.trim()) submitScore();
    });
    playerNameInput.addEventListener('input', () => {
      submitScoreBtn.disabled = !playerNameInput.value.trim();
    });

    function submitScore() {
      const name = playerNameInput.value.trim();
      if (!name) return;
      const leaderboard = Leaderboard.addScore(GAME_NAME, name, score);
      nameInputContainer.classList.add('hidden');
      leaderboardContainer.classList.remove('hidden');
      leaderboardContainer.innerHTML = '<h3 class="text-accent" style="margin-bottom:10px;">Top 10 Players</h3>' + Leaderboard.render(GAME_NAME);
      submitScoreBtn.textContent = 'View Leaderboard';
      submitScoreBtn.onclick = showLeaderboard;
    }

    function showLeaderboard() {
      leaderboardContainer.classList.remove('hidden');
      submitScoreBtn.textContent = 'View Leaderboard';
      submitScoreBtn.onclick = showLeaderboard;
    }

    draw();
  </script>
</body>
</html>
