<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breakout - Game Hub</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --game-accent: #00d4ff;
      --game-accent-rgb: 0, 212, 255;
    }
    #gameCanvas { cursor: none; }
  </style>
</head>
<body>
  <h1 class="game-title">Breakout</h1>
  <div class="game-info-bar">
    <div><span class="info-label">Score</span><span class="info-value" id="score">0</span></div>
    <div><span class="info-label">High Score</span><span class="info-value" id="highScore">0</span></div>
    <div><span class="info-label">Level</span><span class="info-value" id="level">1</span></div>
  </div>
  <div id="raceScorePanel" class="hidden" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;justify-content:center;"></div>
  <canvas id="gameCanvas" class="game-canvas-border" width="700" height="500"></canvas>
  <div class="controls-hint">
    <p><kbd>Left</kbd>/<kbd>Right</kbd> or Mouse to move | Click or <kbd>Space</kbd> to start</p>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="startBtn">Start Game</button>
    <button class="btn btn-back btn-sm" id="backBtn">← Hub</button>
  </div>
  <div class="gh-modal-backdrop hidden" id="gameOver">
    <div class="gh-modal">
      <h2 id="winnerText">Game Over!</h2>
      <p class="score-label">Score: <span id="finalScore">0</span></p>
      <div id="raceResults" class="hidden" style="margin-bottom:14px;font-size:.95rem;line-height:1.8;"></div>
      <div id="nameInputContainer" class="name-input-wrap">
        <input type="text" id="playerName" placeholder="Enter your name" maxlength="15" />
      </div>
      <div id="leaderboardContainer" class="leaderboard-wrap hidden"></div>
      <div class="btn-row" style="justify-content:center;">
        <button class="btn btn-primary" id="submitScoreBtn" disabled>Submit Score</button>
        <button class="btn btn-secondary" id="restartBtn">Play Again</button>
      </div>
    </div>
  </div>
  <script src="leaderboard.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="multiplayer.js"></script>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const levelEl = document.getElementById('level');
    const gameOverDiv = document.getElementById('gameOver');
    const gameOverText = document.getElementById('winnerText');
    const finalScoreEl = document.getElementById('finalScore');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const backBtn = document.getElementById('backBtn');
    const playerNameInput = document.getElementById('playerName');
    const submitScoreBtn = document.getElementById('submitScoreBtn');
    const nameInputContainer = document.getElementById('nameInputContainer');
    const leaderboardContainer = document.getElementById('leaderboardContainer');
    const GAME_NAME = 'breakout';

    const paddleWidth = 100, paddleHeight = 15;
    const ballSize = 8;
    const brickRowCount = 5, brickColCount = 9;
    const brickPadding = 10, brickOffsetTop = 50, brickOffsetLeft = 35;
    const brickWidth = 65, brickHeight = 20;

    let score = 0, highScore = localStorage.getItem('breakoutHighScore') || 0;
    let level = 1, gameRunning = false, animationId;

    highScoreEl.textContent = highScore;

    const paddle = { x: canvas.width/2 - paddleWidth/2, width: paddleWidth, height: paddleHeight, dy: 0 };
    const ball = { x: canvas.width/2, y: canvas.height - 50, dx: 4, dy: -4, speed: 5 };

    let bricks = [];

    function initBricks() {
      bricks = [];
      const colors = ['#ff4444', '#ff8844', '#ffdd44', '#44ff44', '#4488ff'];
      for (let c = 0; c < brickColCount; c++) {
        for (let r = 0; r < brickRowCount; r++) {
          bricks.push({ x: c * (brickWidth + brickPadding) + brickOffsetLeft, y: r * (brickHeight + brickPadding) + brickOffsetTop, status: 1, color: colors[r] });
        }
      }
    }

    function drawRect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function drawCircle(x, y, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fill();
    }

    function draw() {
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw bricks
      bricks.forEach(b => {
        if (b.status === 1) drawRect(b.x, b.y, brickWidth, brickHeight, b.color);
      });

      // Draw paddle
      drawRect(paddle.x, canvas.height - paddleHeight - 10, paddle.width, paddle.height, '#00d4ff');

      // Draw ball
      drawCircle(ball.x, ball.y, ballSize, '#fff');
    }

    function update() {
      paddle.x += paddle.dy;
      paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));

      ball.x += ball.dx;
      ball.y += ball.dy;

      if (ball.x <= 0 || ball.x >= canvas.width) ball.dx *= -1;
      if (ball.y <= 0) ball.dy *= -1;

      if (ball.x > paddle.x && ball.x < paddle.x + paddle.width && ball.y + ballSize >= canvas.height - paddleHeight - 10 && ball.dy > 0) {
        ball.dy *= -1;
        const hitPos = (ball.x - paddle.x) / paddle.width - 0.5;
        ball.dx = hitPos * 8;
        ball.speed = Math.min(ball.speed + 0.1, 10);
      }

      if (ball.y > canvas.height) {
        endGame(false);
        return;
      }

      bricks.forEach(b => {
        if (b.status === 1) {
          if (ball.x > b.x && ball.x < b.x + brickWidth && ball.y > b.y && ball.y < b.y + brickHeight) {
            ball.dy *= -1;
            b.status = 0;
            score += 10;
            scoreEl.textContent = score;
            broadcastScore();
            if (score % 100 === 0) {
              level++;
              levelEl.textContent = level;
              ball.speed = Math.min(ball.speed + 1, 12);
              ball.dx *= 1.1;
              ball.dy *= 1.1;
            }
          }
        }
      });

      if (bricks.every(b => b.status === 0)) {
        endGame(true);
      }
    }

    function gameLoop() {
      if (!gameRunning) return;
      update();
      draw();
      animationId = requestAnimationFrame(gameLoop);
    }

    function endGame(win) {
      gameRunning = false;
      cancelAnimationFrame(animationId);
      broadcastFinalScore();
      gameOverText.textContent = win ? 'You Win!' : 'Game Over!';
      finalScoreEl.textContent = score;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('breakoutHighScore', highScore);
        highScoreEl.textContent = highScore;
      }
      if (onlineMode) {
        gameOverDiv.classList.remove('hidden');
        nameInputContainer.style.display = 'none';
        return;
      }
      gameOverDiv.classList.remove('hidden');

      playerNameInput.value = '';
      nameInputContainer.style.display = 'block';
      submitScoreBtn.disabled = true;
      submitScoreBtn.style.opacity = '0.5';
      // Show leaderboard if there are existing scores
      const existingLeaderboard = Leaderboard.get(GAME_NAME);
      if (existingLeaderboard && existingLeaderboard.length > 0) {
        leaderboardContainer.classList.remove('hidden');
        leaderboardContainer.innerHTML = '<h3 style="color: #00d4ff; margin-bottom: 10px;">Top 10 Players</h3>' + Leaderboard.render(GAME_NAME);
        submitScoreBtn.textContent = 'View Leaderboard';
        submitScoreBtn.onclick = showLeaderboard;
      } else {
        leaderboardContainer.classList.add('hidden');
        submitScoreBtn.textContent = 'Submit Score';
        submitScoreBtn.onclick = submitScore;
      }
    }

    function showLeaderboard() {
      leaderboardContainer.classList.remove('hidden');
      submitScoreBtn.textContent = 'View Leaderboard';
      submitScoreBtn.onclick = showLeaderboard;
    }

    function startGame() {
      score = 0; level = 1;
      scoreEl.textContent = '0'; levelEl.textContent = '1';
      gameOverDiv.classList.add('hidden');
      initBricks();
      paddle.x = canvas.width/2 - paddleWidth/2;
      ball.x = canvas.width/2;
      ball.y = canvas.height - 50;
      ball.dx = 4 * (Math.random() > 0.5 ? 1 : -1);
      ball.dy = -4;
      ball.speed = 5;
      gameRunning = true;
      gameLoop();
    }

    const keys = {};
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if(e.key==='ArrowLeft'||e.key==='ArrowRight'||e.key===' ') e.preventDefault();
    });
    document.addEventListener('keyup', e => keys[e.key] = false);

    function handleInput() {
      if (!gameRunning) return;
      paddle.dy = 0;
      if (keys['ArrowLeft']) paddle.dy = -7;
      if (keys['ArrowRight']) paddle.dy = 7;
    }

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      paddle.x = e.clientX - rect.left - paddle.width/2;
    });

    canvas.addEventListener('click', () => { if (!gameRunning && gameOverDiv.classList.contains('hidden')) startGame(); });
    document.addEventListener('keydown', e => { if (e.code === 'Space' && !gameRunning && gameOverDiv.classList.contains('hidden')) startGame(); });

    setInterval(handleInput, 16);
    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
    backBtn.addEventListener('click', () => window.location.href = 'index.html');
    submitScoreBtn.addEventListener('click', submitScore);
    playerNameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && playerNameInput.value.trim()) submitScore();
    });
    playerNameInput.addEventListener('input', () => {
      submitScoreBtn.disabled = !playerNameInput.value.trim();
      submitScoreBtn.style.opacity = playerNameInput.value.trim() ? '1' : '0.5';
    });

    function submitScore() {
      const name = playerNameInput.value.trim();
      if (!name) return;
      const leaderboard = Leaderboard.addScore(GAME_NAME, name, score);
      nameInputContainer.style.display = 'none';
      leaderboardContainer.classList.remove('hidden');
      leaderboardContainer.innerHTML = '<h3 style="color: #00d4ff; margin-bottom: 10px;">Top 10 Players</h3>' + Leaderboard.render(GAME_NAME);
      submitScoreBtn.textContent = 'View Leaderboard';
      submitScoreBtn.onclick = showLeaderboard;
    }

    function showLeaderboard() {
      leaderboardContainer.classList.remove('hidden');
      submitScoreBtn.textContent = 'View Leaderboard';
      submitScoreBtn.onclick = showLeaderboard;
    }

    initBricks();
    draw();

    // ── Online / Score-Race Mode ──────────────────────────────────────────────
    function checkOnlineMode() {
      const s = sessionStorage.getItem('gh_room');
      if (!s) return false;
      try { const d = JSON.parse(s); return d.gameType === GAME_NAME ? d : false; }
      catch(e) { return false; }
    }
    const sessionData = checkOnlineMode();
    let onlineMode = false;
    let ghRoom = null;
    let onlinePlayers = [];
    let raceScores = {};

    if (sessionData) {
      onlineMode = true;
      onlinePlayers = sessionData.players || [];
      onlinePlayers.forEach(p => { raceScores[p.id] = { name: p.name || 'Player', avatar: p.avatar || '🎮', score: 0, done: false }; });
      ghRoom = new GameRoom();
      if (sessionData.role === 'host') {
        ghRoom.create(GAME_NAME, sessionData.settings || {}, onRoomEvent, sessionData.code);
      } else {
        ghRoom.join(sessionData.code, sessionData.player, onRoomEvent);
      }
      document.getElementById('raceScorePanel').classList.remove('hidden');
    }

    function onRoomEvent(event, data) {
      if (event === 'room-update') {
        onlinePlayers = data.players || onlinePlayers;
        onlinePlayers.forEach(p => {
          if (!raceScores[p.id]) raceScores[p.id] = { name: p.name || 'Player', avatar: p.avatar || '🎮', score: 0, done: false };
        });
        renderRaceScores();
      }
      if (event === 'game-move') {
        const d = data.data;
        if (d.type === 'score-update') {
          if (raceScores[d.playerId]) raceScores[d.playerId].score = d.score;
          renderRaceScores();
        }
        if (d.type === 'final-score') {
          if (raceScores[d.playerId]) { raceScores[d.playerId].score = d.score; raceScores[d.playerId].done = true; }
          renderRaceScores();
          checkAllDone();
        }
      }
      if (event === 'player-left') {
        if (raceScores[data.playerId]) raceScores[data.playerId].done = true;
        checkAllDone();
      }
    }

    function broadcastScore() {
      if (!onlineMode || !ghRoom) return;
      ghRoom.sendMove({ type: 'score-update', playerId: ghRoom.myPlayer.id, score: score });
    }

    function broadcastFinalScore() {
      if (!onlineMode || !ghRoom) return;
      const myId = ghRoom.myPlayer.id;
      ghRoom.sendMove({ type: 'final-score', playerId: myId, score: score });
      if (raceScores[myId]) { raceScores[myId].score = score; raceScores[myId].done = true; }
      renderRaceScores();
      checkAllDone();
    }

    function checkAllDone() {
      if (!onlineMode) return;
      const allDone = Object.values(raceScores).every(p => p.done);
      if (allDone) showRaceResults();
    }

    function showRaceResults() {
      const sorted = Object.entries(raceScores).sort((a, b) => b[1].score - a[1].score);
      const myId = ghRoom && ghRoom.myPlayer ? ghRoom.myPlayer.id : null;
      const winner = sorted[0];
      const isWinner = myId && winner[0] === myId;
      const raceResultsEl = document.getElementById('raceResults');
      if (raceResultsEl) {
        raceResultsEl.innerHTML = '<strong>Race Results:</strong><br>' + sorted.map(([id, p], i) =>
          `${['🥇','🥈','🥉'][i]||((i+1)+'.')} ${p.avatar} ${esc(p.name)}: ${p.score}${id===myId?' (you)':''}`
        ).join('<br>');
        raceResultsEl.classList.remove('hidden');
      }
      const winnerTextEl = document.getElementById('winnerText');
      if (winnerTextEl) winnerTextEl.textContent = isWinner ? '🏆 You Win!' : `${winner[1].avatar} ${winner[1].name} Wins!`;
      const gameOverEl = document.getElementById('gameOver');
      if (gameOverEl) gameOverEl.classList.remove('hidden');
    }

    function renderRaceScores() {
      if (!onlineMode) return;
      const container = document.getElementById('raceScorePanel');
      if (!container) return;
      const myId = ghRoom && ghRoom.myPlayer ? ghRoom.myPlayer.id : null;
      container.innerHTML = Object.entries(raceScores)
        .sort((a,b) => b[1].score - a[1].score)
        .map(([id, p]) => `
        <div class="player-pill${id === myId ? '" style="border-color:var(--game-accent)' : ''}">
          <span class="avatar">${p.avatar}</span>
          <span class="player-name">${esc(p.name)}</span>
          <span class="player-score">${p.score}${p.done ? ' ✓' : ''}</span>
        </div>
      `).join('');
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
</html>
